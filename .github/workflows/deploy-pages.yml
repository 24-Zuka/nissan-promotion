# GitHub Pages へ「ブラウザ完結（静的）」のアプリを自動公開する。
# main に push するたびに自動でビルド・デプロイ（URL は変わらず内容だけ更新）。
#
# 事前に一度だけ: リポジトリ Settings → Pages → Build and deployment → Source を
# 「GitHub Actions」に設定する（クラシックの「Deploy from a branch」ではない）。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに（後発の push を優先）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser for E2E
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm test

      - name: End-to-end tests
        run: npm run e2e

      - name: Build web (static / browser-only)
        run: npm run build -w @crm/shared && npm run build -w @crm/web
        env:
          VITE_STATIC: '1'
          # リポジトリ名に合わせたサブパス（24-Zuka/nissan-promotion → /nissan-promotion/）。
          BASE_PATH: /nissan-promotion/

      - name: SPA fallback (404 -> index)
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
